name: Sync chart.html

on:
  repository_dispatch:
    types: [acttrader-charts-release]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download chart.html
        run: |
          curl -L --fail \
            "${{ github.event.client_payload.chart_html_url }}" \
            -o Sources/ActtraderCharts/Resources/chart.html

      - name: Bump version in podspec
        run: |
          sed -i "s/s\.version\s*=\s*'[^']*'/s.version          = '${{ github.event.client_payload.version }}'/" ActtraderCharts.podspec

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update bundled chart.html to v${{ github.event.client_payload.version }}"

      - name: Push to main
        run: git push origin HEAD:main
