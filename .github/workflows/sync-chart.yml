name: Sync chart.html

on:
  repository_dispatch:
    types: [acttrader-charts-release]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download chart.html
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.CHARTS_REPO_PAT }}" \
            "${{ github.event.client_payload.chart_html_url }}" \
            -o Sources/ActtraderCharts/Resources/chart.html

      - name: Bump version in podspec
        run: |
          sed -i "s/s\.version\s*=\s*'[^']*'/s.version          = '${{ github.event.client_payload.version }}'/" ActtraderCharts.podspec

      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          title: "chore: sync chart.html v${{ github.event.client_payload.version }}"
          branch: "chore/sync-chart-${{ github.event.client_payload.version }}"
          commit-message: "chore: update bundled chart.html to v${{ github.event.client_payload.version }}"
          body: |
            Automated sync from acttrader-charts release v${{ github.event.client_payload.version }}.

            **Source:** ${{ github.event.client_payload.chart_html_url }}

            Please review and merge to ship the updated chart bundle.
            After merging, push a matching tag (`v${{ github.event.client_payload.version }}`) to trigger publish.
